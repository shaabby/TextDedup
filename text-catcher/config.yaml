targets:
  # Configure domains only. The crawler starts from https://<domain>/ automatically.
  # 只配置域名，爬虫会自动从 https://<domain>/ 作为入口开始递归抓取。
  domains:
    - www.dushu.com
  default_language: zh

crawl:
  # Max wait time for TCP/TLS connection establishment.
  # 连接建立（TCP/TLS）的最大等待秒数。
  connect_timeout_seconds: 3
  timeout_seconds: 5
  max_retries: 3
  checkpoint_every_n_urls: 100
  concurrent_workers: 4
  backoff_seconds: 1.0
  max_backoff_seconds: 16.0
  jitter_seconds: 0.4
  min_interval_seconds: 1.0
  respect_retry_after: true
  user_agent: TextCatcherBot/1.0 (+https://example.org/contact)
  recursive_enabled: true
  allowed_domains: [www.dushu.com]   # 填域名，如 www.example.com；留空则自动从 seed URL 推断
  max_depth: 5
  max_pages: 2000
  follow_query_strings: false
  only_html: true
  skip_binary_resources: true
  # Store patterns: matched pages are requested and stored.
  # 入库路径规则：匹配到的页面会发请求并写入数据。
  path_allow_patterns:
    - /showbook/*/*.html
  # Request-only patterns: matched pages are requested but not stored.
  # 只请求不入库路径规则：用于过渡页/目录页。
  path_request_only_patterns:
    - /
    - /readbook/*
    - /showbook/*
  # Keep homepage request enabled so crawler can discover links.
  # 保持首页可请求，便于发现子链接。
  seed_always_request: true

incremental:
  enabled: true
  skip_seen_urls: true

storage:
  raw_path: data/raw/raw_docs.jsonl
  failed_urls_path: data/raw/failed_urls.jsonl
  collect_state_path: data/raw/collect_state.json
